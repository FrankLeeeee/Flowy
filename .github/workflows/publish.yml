name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - flowy
          - flowy-runner
          - both
      dry_run:
        description: Dry run (skip actual publish)
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # REQUIRED

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          rm package-lock.json
          npm install

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish @frankleeeee/flowy
        if: inputs.package == 'flowy' || inputs.package == 'both'
        run: |
          # clear node auth token to avoid npm publish errors
          # the auth token is set by actions/setup-node@v4
          unset NODE_AUTH_TOKEN
          npm publish --workspace=backend --provenance --access public ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Publish @frankleeeee/flowy-runner
        if: inputs.package == 'flowy-runner' || inputs.package == 'both'
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --workspace=runner --provenance --access public ${{ inputs.dry_run && '--dry-run' || '' }}
