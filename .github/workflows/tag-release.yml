name: Tag Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: startsWith(github.event.head_commit.message, 'chore: bump version to v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges | grep -v "^- chore: bump version")
          else
            NOTES=$(git log "$TAG" --pretty=format:"- %s" --no-merges | grep -v "^- chore: bump version")
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --latest
