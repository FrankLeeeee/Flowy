name: Tag Release
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  tag:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.head_commit.message, 'chore: bump version to v') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "Could not extract version from commit message" >&2
            exit 1
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges | grep -v "^- chore: bump version" || true)
          else
            NOTES=$(git log "$TAG" --pretty=format:"- %s" --no-merges | grep -v "^- chore: bump version" || true)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --latest
